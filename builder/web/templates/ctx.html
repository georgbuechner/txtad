{% extends "layout/layout.html" %}

{% block content %}
<h1>{{ctx.id}}</h1>

<form>
  <label>Name:</label>
  <input 
    id="name" 
    name="name" 
    type="text" 
    value="{{ctx.name}}"
    placeholder="Context Name" 
  ></input>
  <br>
  <label>Description:</label>
  <textarea
    id="description" 
    name="description" 
    placeholder="Description" 
  >{{ctx.description}}
  </textarea>

</form>

{% endblock %}
