
{% if label %} 
  <h4>{{label}}</h4>
{% endif %}

<div class="accordion accordion" id="accordionExample">
  {% for txt in texts %}
    <div class="accordion-item">
      <h2 class="accordion-header" id="headingtxt{{label}}{{loop.index}}">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" 
            data-bs-target="#collapsetxt{{label}}{{loop.index}}" aria-expanded="false" 
            aria-controls="collapsetxt{{label}}{{loop.index}}">
          {{txt.txt}}
        </button>
      </h2>
      <div id="collapsetxt{{label}}{{loop.index}}" class="accordion-collapse collapse" 
          aria-labelledby="headingtxt{{label}}{{loop.index}}" data-bs-parent="#accordionExample">
        <div class="accordion-body">
            <form> 
              <div class="input-group mb-3">
                <span class="input-group-text" id="txt">Text:</span>
                <input type="text" class="form-control" placeholder="text" aria-label="" aria-describedby="txt" value="{{txt.txt}}">
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text" id="logic">Logic:</span>
                <input type="text" class="form-control" placeholder="..." aria-label="" 
                  aria-describedby="logic" value="{{txt.logic}}">
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text" id="one_time_events">One-Time Events:</span>
                <input type="text" class="form-control" placeholder="..." aria-label="" 
                  aria-describedby="one_time_events" value="{{txt.one_time_events}}">
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text" id="permanent_events">Permanent Events:</span>
                <input type="text" class="form-control" placeholder="..." aria-label="" 
                  aria-describedby="permanent_events" value="{{txt.permanent_events}}">
              </div>
              <div class="input-group mb-3">
                <span class="input-group-text" id="shared">Shared</span>
                <div class="input-group-text">
                  <input class="form-check-input mt-0" type="checkbox" value="{{txt.shared}}" aria-label="Checkbox for following text input">
                </div>
              </div>
              <button type="submit" class="btn btn-primary">save</button>
              <button type="button" class="btn btn-secondary">remove</button>
              <button type="button" class="btn btn-secondary">insert before</button>
              <button type="button" class="btn btn-secondary">insert after</button>
            </form>
        </div>
      </div>
    </div>
  {% endfor %}
</div>
